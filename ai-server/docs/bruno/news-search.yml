info:
  name: news/search
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:33333/news/search?keyword=google&page=1&size=10
  params:
    - name: keyword
      value: google
      type: query
    - name: page
      value: "1"
      type: query
    - name: size
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
