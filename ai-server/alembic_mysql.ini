[alembic]
script_location = alembic_mysql
prepend_sys_path = .
version_path_separator = os

# 실제 URL은 alembic_mysql/env.py 에서 settings + ALEMBIC_MYSQL_DATABASE 로 주입
sqlalchemy.url = mysql+pymysql://user:password@localhost:3306/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
