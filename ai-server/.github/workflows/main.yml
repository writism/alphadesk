name: Deploy alpha-terminal-ai-server via Docker

on:
  push:
    branches:
      - main

jobs:
  typecheck:
    # BL-BE-87: continue-on-error 제거 → pyright 오류 시 CI fail (실질 게이팅)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pyright
        run: npm install -g pyright

      - name: Install runtime deps (for import resolution)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pyright
        run: pyright

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ secrets.REPO_USER }}/alpha-terminal-api:latest
          platforms: linux/arm64
          cache-from: type=registry,ref=ghcr.io/${{ secrets.REPO_USER }}/alpha-terminal-api:cache
          cache-to: type=registry,ref=ghcr.io/${{ secrets.REPO_USER }}/alpha-terminal-api:cache,mode=max

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, alpha-terminal-api]

    steps:
      - name: GHCR Login
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: docker pull ghcr.io/${{ secrets.REPO_USER }}/alpha-terminal-api:latest

      - name: Stop old container
        run: |
          docker stop alphadesk-api || true
          docker rm alphadesk-api || true
          docker image prune -f

      - name: Run container
        run: |
          docker run -d \
            --name alphadesk-api \
            -p 33333:33333 \
            --env-file /home/ec2-user/alpha-terminal-ai-server/.env \
            --network alphadesk-network \
            --restart unless-stopped \
            ghcr.io/${{ secrets.REPO_USER }}/alpha-terminal-api:latest

      - name: Health check
        run: |
          for i in {1..12}; do
            if curl -sSf http://localhost:33333/docs > /dev/null 2>&1; then
              echo "alphadesk-api is UP"
              exit 0
            fi
            echo "Waiting... ($i/12)"
            sleep 5
          done
          echo "Health check failed"
          docker logs alphadesk-api --tail 200
          exit 1
