[tool.pyright]
# 단계적 strict 정책:
# - 우선 `basic` 레벨로 시작해 신규 코드에 대한 명백한 오류만 잡는다.
# - 이후 파일·모듈 단위로 `strict` 리스트에 옮겨 서서히 범위를 확장한다.
#
# BL-BE-87 후속: CI 게이팅을 실질적으로 적용하기 위해
# 기존 코드 전반에 광범위하게 퍼져 있는 legacy 이슈들은 일단 `warning`/`none` 으로
# 낮추고, 새로 도입하는 코드가 가장 흔히 유발하는 reportMissingImports /
# reportReturnType / reportAssignmentType / reportInvalidTypeForm 는 error 로 유지한다.
# → legacy 청소는 별도 백로그(타입 클린업)에서 점진적으로 끌어올린다.
include = ["app"]
exclude = [
    "**/__pycache__",
    "**/.mypy_cache",
    "**/.pytest_cache",
    "alembic_mysql",
    "tests",
]
typeCheckingMode = "basic"
pythonVersion = "3.11"

# --- legacy 관련 (대부분 SQLAlchemy Column[T] / 외부 SDK 시그니처 불일치) ---
# SQLAlchemy 2.x Column[T] 와 dataclass/Pydantic 필드 타입이 어긋나서 발생하는 대량 경고.
# 런타임 동작은 정상이므로 현재는 비활성화.
reportArgumentType = "none"
reportCallIssue = "none"
# kiwipiepy Token / 일부 3rd-party SDK 속성 누락 — stub 미비에 따른 것.
reportAttributeAccessIssue = "warning"
reportOptionalMemberAccess = "warning"
reportGeneralTypeIssues = "warning"
reportOperatorIssue = "warning"
# stub 미존재 모듈 import (kiwipiepy 등)
reportMissingImports = "warning"
reportMissingTypeStubs = false
reportPrivateImportUsage = "warning"

# --- 유지(실제 버그 가능성 높음) ---
# reportInvalidTypeForm 은 error 기본값을 유지.
# reportReturnType / reportAssignmentType 은 legacy SQLAlchemy Column 및 LangChain
# 메시지 타입 유니온 때문에 현재 다수 발생 → 일단 warning 으로 내림.
# 별도 백로그(타입 클린업)에서 파일 단위로 error 승격할 예정.
reportReturnType = "warning"
reportAssignmentType = "warning"

# 점진적으로 strict 리스트에 추가할 모듈 예시(현재 비어 있음).
# strict = [
#     "app/domains/pipeline/application/response/run_pipeline_result.py",
# ]
