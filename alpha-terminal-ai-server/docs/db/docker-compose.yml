services:
  mysql:
    image: mysql:8.0
    container_name: alphadesk-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alphadesk
      MYSQL_USER: alphadesk
      MYSQL_PASSWORD: alphadesk
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
